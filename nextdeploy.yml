
# ==============================
# NEXTDEPLOY CONFIGURATION FILE
# ==============================
version: "1.0"

# -----
# TARGET TYPE — VPS
# -----
target_type: vps

# -----
# APP METADATA
# -----
app:
  name: ressencesystems
  environment: production
  domain:
    name: ressencesystems.com
    provider: namecheap
    dns: manual
    zone: ressencesystems.com
  port: 3000

# -----
# DEPLOYMENT SERVERS
# -----
servers:
  - name: "production-01"
    host: 54.89.232.68
    username: ubuntu
    key_path: ~/demo.pem
    # password: ""  # Optional

# -----
# LOGGING CONFIGURATION
# -----
logging:
  enabled: true
  provider: nextdeploy
  stream_logs: true
  log_path: /var/log/containers/resessecsystems.log

# -----
# MONITORING & ALERTING
# -----
monitoring:
  enabled: true
  cpu_threshold: 80
  memory_threshold: 75
  disk_threshold: 90
  alert:
    email: admin@resessecsystems.com
    # slack_webhook: https://hooks.slack.com/services/...
    notify_on:
      - crash
      - healthcheck_failed
      - high_cpu
      - high_memory

# -----
# BACKUP STRATEGY
# -----
backup:
  enabled: true
  frequency: daily
  retention_days: 7
  storage:
    provider: s3
    bucket: resessecsystems-backups
    region: us-east-1

# -----
# WEBHOOKS AFTER DEPLOYMENT
# -----
webhook:
  on_success:
    - echo "Deployment successful for resessecsystems.com"
  on_failure:
    - echo "Deployment failed for resessecsystems.com"
